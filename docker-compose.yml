services:
  portal:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORTAL_HOME: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ./data:/app/data
