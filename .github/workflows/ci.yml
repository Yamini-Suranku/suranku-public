name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # One job per app. Copy this block for a new app under apps/<id>/ and adjust
  # the name + working-directory (add `paths:` filters per app if desired).
  data-intelligence-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/data-intelligence-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/data-intelligence-portal/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
