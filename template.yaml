AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Data Intelligence Portal on AWS Lambda (scale-to-zero, pay-per-request).
  One container image serves the static site AND /api via a Lambda Function URL,
  so there's no API Gateway, no CORS, and no separate frontend hosting.
  See DEPLOY.md for build/deploy steps and the ephemeral-storage caveat.

Parameters:
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional. Enables native Claude answers (else deterministic fallback).

Globals:
  Function:
    Timeout: 120          # repo scans can take a few seconds
    MemorySize: 1024
    EphemeralStorage:
      Size: 2048          # /tmp for SQLite + extracted repo archives

Resources:
  PortalFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: apps/data-intelligence-portal/Dockerfile.lambda
      DockerContext: .
      DockerTag: latest
    Properties:
      PackageType: Image
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          ANTHROPIC_MODEL: claude-opus-4-8
      FunctionUrlConfig:
        AuthType: NONE     # public demo. For a private instance use AWS_IAM.

Outputs:
  PortalUrl:
    Description: The app (frontend + API) — link the Pages hub here.
    Value: !GetAtt PortalFunctionUrl.FunctionUrl
